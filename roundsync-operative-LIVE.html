<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="RoundSync">
<meta name="theme-color" content="#0D0D0D">
<title>RoundSync Field</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0D0D0D;--surface:#161616;--card:#1C1C1C;--card2:#242424;
  --line:rgba(255,255,255,.07);--white:#F2F2EE;
  --muted:rgba(242,242,238,.38);--muted2:rgba(242,242,238,.14);
  --green:#00E676;--green-d:#00C060;--red:#FF3D57;
  --amber:#FFB300;--blue:#2979FF;--purple:#B388FF;
  --mono:'JetBrains Mono',monospace;--body:'Outfit',sans-serif;
}
html,body{
  font-family:var(--body);background:var(--bg);color:var(--white);
  min-height:100vh;max-width:480px;margin:0 auto;
  overflow-x:hidden;-webkit-font-smoothing:antialiased;
}

/* ── SCREENS ─────────────────────── */
.screen{display:none;flex-direction:column;min-height:100vh}
.screen.active{display:flex}

/* ── LOADER ──────────────────────── */
.loader{display:none;position:fixed;inset:0;background:rgba(13,13,13,.9);
  backdrop-filter:blur(12px);z-index:999;
  align-items:center;justify-content:center;flex-direction:column;gap:14px}
.loader.show{display:flex}
.spin{width:30px;height:30px;border:2px solid var(--line);
  border-top-color:var(--green);border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.load-txt{font-family:var(--mono);font-size:.72rem;color:var(--muted)}

/* ── TOAST ───────────────────────── */
.toast{position:fixed;top:18px;left:50%;
  transform:translateX(-50%) translateY(-80px);
  padding:9px 18px;border-radius:100px;
  font-family:var(--mono);font-size:.75rem;font-weight:500;
  z-index:998;transition:transform .28s cubic-bezier(.16,1,.3,1);white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.s{background:var(--green);color:#000}
.toast.e{background:var(--red);color:#fff}
.toast.i{background:var(--blue);color:#fff}
.toast.w{background:var(--amber);color:#000}

/* ── OFFLINE ─────────────────────── */
.offline-bar{display:none;background:var(--amber);color:#000;
  font-family:var(--mono);font-size:.68rem;font-weight:700;
  text-align:center;padding:5px}
body.offline .offline-bar{display:block}

/* ══════════════════════════════════
   LOGIN
══════════════════════════════════ */
#login{
  background:var(--bg);align-items:center;
  justify-content:center;padding:40px 28px;position:relative;
}
#login::before{
  content:'';position:absolute;inset:0;
  background-image:
    linear-gradient(rgba(0,230,118,.04) 1px,transparent 1px),
    linear-gradient(90deg,rgba(0,230,118,.04) 1px,transparent 1px);
  background-size:30px 30px;pointer-events:none;
}
#login::after{
  content:'';position:absolute;width:260px;height:260px;
  background:radial-gradient(circle,rgba(0,230,118,.09),transparent 70%);
  top:30%;left:50%;transform:translate(-50%,-50%);pointer-events:none;
}
.login-inner{position:relative;z-index:2;width:100%;max-width:300px;
  display:flex;flex-direction:column;align-items:center}
.logo{display:flex;align-items:center;gap:10px;margin-bottom:4px}
.logo-mark{width:34px;height:34px;background:var(--green);border-radius:9px;
  display:flex;align-items:center;justify-content:center}
.logo-mark svg{width:18px;height:18px}
.logo-name{font-size:1.5rem;font-weight:800;letter-spacing:-.5px}
.logo-sub{font-family:var(--mono);font-size:.62rem;color:var(--muted);
  letter-spacing:3px;text-transform:uppercase;margin-bottom:48px}
.pin-lbl{font-family:var(--mono);font-size:.62rem;color:var(--muted);
  letter-spacing:2px;text-transform:uppercase;margin-bottom:18px}
.pin-dots{display:flex;gap:14px;margin-bottom:36px}
.pin-dot{width:11px;height:11px;border-radius:50%;border:1.5px solid var(--muted2);transition:all .2s}
.pin-dot.on{background:var(--green);border-color:var(--green);box-shadow:0 0 12px rgba(0,230,118,.5)}
.kpad{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;width:100%}
.k{aspect-ratio:1;background:var(--surface);border:1px solid var(--line);
  border-radius:14px;color:var(--white);font-family:var(--body);
  font-size:1.4rem;font-weight:700;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:all .12s}
.k:active{background:var(--card2);transform:scale(.91)}
.k.del{background:transparent;color:var(--muted);font-size:.9rem;border-color:transparent}
.k.empty{pointer-events:none;background:transparent;border-color:transparent}
.pin-err{font-family:var(--mono);font-size:.72rem;color:var(--red);
  text-align:center;margin-top:18px;min-height:16px}

/* ══════════════════════════════════
   JOB SCREEN — HEADER
══════════════════════════════════ */
#jobs{background:var(--bg)}
.app-hdr{
  padding:14px 16px 10px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:50;
  background:rgba(13,13,13,.94);backdrop-filter:blur(20px);
  border-bottom:1px solid var(--line);
}
.app-logo{display:flex;align-items:center;gap:9px}
.app-logo-mark{width:26px;height:26px;background:var(--green);border-radius:7px;
  display:flex;align-items:center;justify-content:center}
.app-logo-mark svg{width:14px;height:14px}
.app-logo-name{font-size:.9rem;font-weight:800}
.app-meta{text-align:right}
.app-op{font-size:.85rem;font-weight:700}
.app-date{font-family:var(--mono);font-size:.6rem;color:var(--muted);margin-top:1px}

/* Progress */
.prog-track{height:2px;background:var(--line)}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--green),#00BCD4);transition:width .7s ease}

/* ── FILTER TABS ──────────────────── */
.filter-row{
  display:flex;gap:0;background:var(--surface);
  border-bottom:1px solid var(--line);overflow-x:auto;
  scrollbar-width:none;
}
.filter-row::-webkit-scrollbar{display:none}
.ftab{
  flex:1;min-width:60px;padding:10px 4px;text-align:center;
  font-family:var(--mono);font-size:.65rem;font-weight:600;
  color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;
  transition:all .2s;white-space:nowrap;letter-spacing:.3px;
}
.ftab.on{color:var(--green);border-bottom-color:var(--green)}
.ftab-count{
  display:inline-flex;align-items:center;justify-content:center;
  background:var(--card2);color:var(--muted);
  font-size:.6rem;padding:1px 5px;border-radius:100px;margin-left:4px;
}
.ftab.on .ftab-count{background:rgba(0,230,118,.18);color:var(--green)}

/* ── STATS BAR ─────────────────────── */
.stats-bar{
  display:grid;grid-template-columns:repeat(5,1fr);
  background:var(--surface);border-bottom:1px solid var(--line);
}
.sbar{padding:9px 4px;text-align:center;border-right:1px solid var(--line)}
.sbar:last-child{border-right:none}
.sbar-n{font-size:1.2rem;font-weight:900;line-height:1}
.sbar-n.g{color:var(--green)}.sbar-n.r{color:var(--red)}
.sbar-n.a{color:var(--amber)}.sbar-n.b{color:var(--blue)}.sbar-n.p{color:var(--purple)}
.sbar-k{font-family:var(--mono);font-size:.55rem;color:var(--muted);
  text-transform:uppercase;letter-spacing:.5px;margin-top:2px}

/* ── JOB LIST ─────────────────────── */
.job-list{flex:1;padding:10px 10px 100px;display:flex;flex-direction:column;gap:8px;
  overflow-y:auto;-webkit-overflow-scrolling:touch}

/* Street group */
.street-group{background:var(--card);border:1px solid var(--line);border-radius:14px;overflow:hidden}
.street-hdr{
  padding:12px 14px 10px;display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid var(--line);cursor:pointer;
}
.street-name{font-size:.9rem;font-weight:800;letter-spacing:-.2px}
.street-pc{font-family:var(--mono);font-size:.65rem;color:var(--muted);margin-top:2px}
.street-meta{display:flex;align-items:center;gap:8px;flex-shrink:0}
.street-prog{font-family:var(--mono);font-size:.65rem;color:var(--muted)}
.street-prog.done{color:var(--green)}
.chevron{font-size:.8rem;color:var(--muted);transition:transform .25s}
.street-group.collapsed .chevron{transform:rotate(-90deg)}
.street-group.collapsed .street-body{display:none}

/* Mark all done btn */
.mark-all-btn{
  width:100%;padding:10px;background:rgba(0,230,118,.08);
  border:none;border-bottom:1px solid var(--line);
  font-family:var(--body);font-weight:700;font-size:.8rem;
  color:var(--green);cursor:pointer;display:flex;
  align-items:center;justify-content:center;gap:8px;transition:all .2s;
}
.mark-all-btn:active{background:rgba(0,230,118,.18)}
.mark-all-btn.done-all{background:transparent;color:var(--muted)}

/* Maps btn on street */
.maps-btn{
  padding:8px 12px;background:rgba(41,121,255,.1);border:none;
  border-bottom:1px solid var(--line);
  font-family:var(--mono);font-size:.65rem;color:var(--blue);
  cursor:pointer;display:flex;align-items:center;gap:7px;width:100%;
  transition:all .2s;
}
.maps-btn:active{background:rgba(41,121,255,.2)}

/* Individual job row */
.job-row{
  padding:11px 14px;border-bottom:1px solid var(--line);
  display:flex;align-items:center;gap:10px;
  transition:background .2s;
}
.job-row:last-child{border-bottom:none}
.job-row.done-row{opacity:.45}
.job-row.missed-row{opacity:.45}

.job-num{
  font-family:var(--mono);font-size:1.1rem;font-weight:700;
  color:var(--white);min-width:36px;flex-shrink:0;
}
.job-info{flex:1;min-width:0}
.job-tags{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:5px}
.tag{
  padding:2px 7px;border-radius:100px;
  font-family:var(--mono);font-size:.6rem;font-weight:600;
  letter-spacing:.3px;
}
.tag-grey  {background:rgba(200,200,200,.12);color:#aaa}
.tag-green {background:rgba(0,230,118,.12);color:var(--green)}
.tag-brown {background:rgba(139,90,43,.25);color:#d4924a}
.tag-blue  {background:rgba(41,121,255,.12);color:var(--blue)}
.tag-dd    {background:rgba(179,136,255,.12);color:var(--purple)}
.tag-paypal{background:rgba(0,156,222,.12);color:#009CDE}
.tag-cash  {background:rgba(0,230,118,.1);color:var(--green)}
.tag-wb    {background:rgba(255,255,255,.06);color:var(--muted)}
.tag-eco   {background:rgba(0,200,100,.08);color:#00C864}

.job-note-txt{
  font-family:var(--mono);font-size:.65rem;color:var(--amber);
  margin-top:3px;line-height:1.4;
}

.job-btns{display:flex;gap:5px;flex-shrink:0}
.jb{
  width:40px;height:40px;border:none;border-radius:10px;
  font-size:.75rem;cursor:pointer;display:flex;align-items:center;
  justify-content:center;transition:all .15s;font-weight:700;
}
.jb:active{transform:scale(.88)}
.jb-done  {background:rgba(0,230,118,.1);color:var(--green)}
.jb-miss  {background:rgba(255,61,87,.1);color:var(--red)}
.jb-done.on  {background:var(--green);color:#000}
.jb-miss.on  {background:var(--red);color:#fff}
/* Tap Return: hold for 0.5s */
.jb-ret   {background:rgba(255,179,0,.1);color:var(--amber)}
.jb-ret.on{background:var(--amber);color:#000}

/* maps micro btn on individual row */
.jb-map{background:rgba(41,121,255,.1);color:var(--blue)}

/* Empty state */
.empty-state{flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;padding:60px 20px;text-align:center}
.empty-icon{font-size:3rem;margin-bottom:14px}
.empty-title{font-size:1rem;font-weight:700;color:var(--muted);margin-bottom:6px}
.empty-sub{font-family:var(--mono);font-size:.72rem;color:var(--muted2)}

/* ── FOOTER ──────────────────────── */
.app-foot{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:480px;padding:9px 12px 26px;
  background:rgba(13,13,13,.96);backdrop-filter:blur(20px);
  border-top:1px solid var(--line);
  display:grid;grid-template-columns:1fr auto auto;gap:8px;z-index:50;
}
.sync-btn{
  background:var(--green);color:#000;border:none;border-radius:11px;
  padding:12px;font-family:var(--body);font-weight:800;font-size:.85rem;
  cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;
  transition:all .2s;
}
.sync-btn:active{transform:scale(.95);background:var(--green-d)}
.sync-cnt{background:#000;color:var(--green);font-family:var(--mono);
  font-size:.6rem;font-weight:700;padding:1px 6px;border-radius:100px;display:none}
.whats-left-btn{
  background:var(--surface);border:1px solid var(--line);color:var(--muted);
  border-radius:11px;padding:12px 14px;font-family:var(--body);
  font-weight:700;font-size:.75rem;cursor:pointer;white-space:nowrap;transition:all .2s;
}
.whats-left-btn.active{border-color:var(--amber);color:var(--amber);
  background:rgba(255,179,0,.08)}
.logout-btn{background:var(--surface);border:1px solid var(--line);
  color:var(--muted);border-radius:11px;padding:12px 14px;
  font-size:.8rem;cursor:pointer;transition:all .2s}

.job-house{display:flex;flex-direction:column;align-items:center;min-width:42px;flex-shrink:0;gap:3px}
.job-price-tag{
  font-family:var(--mono);font-size:.6rem;font-weight:700;
  padding:2px 5px;border-radius:5px;
  background:rgba(0,230,118,.15);color:var(--green);white-space:nowrap;
}
.job-price-tag.auto{background:rgba(179,136,255,.12);color:var(--purple)}
.job-price-tag.credit{background:rgba(41,121,255,.12);color:var(--blue)}
.job-detail{
  display:none;background:var(--card2);
  border-top:1px solid var(--line);padding:12px 14px;
}
.job-detail.open{display:block}
.detail-notes{
  font-family:var(--mono);font-size:.72rem;color:var(--amber);
  margin-bottom:10px;line-height:1.5;white-space:pre-wrap;
}
.detail-note-empty{font-family:var(--mono);font-size:.7rem;color:var(--muted2);margin-bottom:10px}
.detail-row{display:flex;gap:8px;margin-bottom:8px}
.note-input{
  flex:1;background:var(--surface);border:1px solid var(--line);
  border-radius:8px;padding:8px 10px;color:var(--white);
  font-family:var(--mono);font-size:.72rem;resize:none;
  outline:none;min-height:38px;
}
.note-input:focus{border-color:var(--amber)}
.note-save-btn{
  background:var(--amber);color:#000;border:none;border-radius:8px;
  padding:8px 12px;font-family:var(--body);font-weight:700;
  font-size:.75rem;cursor:pointer;white-space:nowrap;flex-shrink:0;
}
.photo-btn{
  background:rgba(41,121,255,.12);color:var(--blue);border:none;
  border-radius:8px;padding:8px 12px;font-family:var(--body);
  font-weight:700;font-size:.75rem;cursor:pointer;width:100%;
  display:flex;align-items:center;justify-content:center;gap:7px;
}
.photo-preview{width:100%;border-radius:8px;margin-top:8px;display:none}
.photo-input{display:none}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);
  backdrop-filter:blur(8px);z-index:200;align-items:flex-end}
.modal-bg.open{display:flex}
.modal{background:var(--surface);border-radius:22px 22px 0 0;
  border:1px solid var(--line);border-bottom:none;
  padding:6px 22px 44px;width:100%;max-width:480px;margin:0 auto;
  animation:slideUp .28s cubic-bezier(.16,1,.3,1)}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-handle{width:36px;height:4px;background:var(--line);
  border-radius:2px;margin:12px auto 22px}
.modal-title{font-size:1.2rem;font-weight:800;margin-bottom:3px;letter-spacing:-.3px}
.modal-sub{font-family:var(--mono);font-size:.72rem;color:var(--muted);margin-bottom:18px}
.modal-amt{background:var(--card);border:1px solid var(--line);border-radius:14px;
  padding:18px;text-align:center;font-size:2.4rem;font-weight:900;
  color:var(--green);margin-bottom:16px;letter-spacing:-1px}
.modal-meths{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.meth{padding:13px;border:1.5px solid var(--line);border-radius:11px;
  background:var(--card);font-family:var(--body);font-weight:700;
  font-size:.85rem;cursor:pointer;display:flex;align-items:center;
  justify-content:center;gap:7px;color:var(--muted);transition:all .18s}
.meth.sel{border-color:var(--green);background:rgba(0,230,118,.07);color:var(--green)}
.modal-confirm{width:100%;padding:14px;border:none;border-radius:11px;
  background:var(--green);color:#000;font-family:var(--body);
  font-weight:800;font-size:.95rem;cursor:pointer;margin-bottom:9px;transition:all .2s}
.modal-confirm:active{transform:scale(.97)}
.modal-skip{width:100%;padding:9px;background:transparent;border:none;
  font-family:var(--mono);font-size:.72rem;color:var(--muted);cursor:pointer}
</style>
</head>
<body>

<div class="offline-bar">⚡ Offline — changes queued</div>
<div class="loader" id="loader"><div class="spin"></div><div class="load-txt" id="loaderTxt">Loading…</div></div>
<div class="toast" id="toast"></div>

<!-- PAYMENT MODAL -->
<div class="modal-bg" id="payModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">Record Payment</div>
    <div class="modal-sub" id="payAddr"></div>
    <div class="modal-amt" id="payAmt">£0.00</div>
    <div class="modal-meths">
      <button class="meth sel" id="mCash" onclick="pickMeth('cash')">💵 Cash</button>
      <button class="meth"     id="mCard" onclick="pickMeth('card')">💳 Card</button>
    </div>
    <button class="modal-confirm" onclick="confirmPay()">✓ Confirm Payment</button>
    <button class="modal-skip"    onclick="skipPay()">No payment — skip</button>
  </div>
</div>

<!-- ══ LOGIN ══ -->
<div class="screen active" id="login">
  <div class="login-inner">
    <div class="logo">
      <div class="logo-mark"><svg viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="2.5" stroke-linecap="round"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg></div>
      <div class="logo-name">RoundSync</div>
    </div>
    <div class="logo-sub">Field Operative</div>
    <div class="pin-lbl">Enter your PIN</div>
    <div class="pin-dots">
      <div class="pin-dot" id="d0"></div><div class="pin-dot" id="d1"></div>
      <div class="pin-dot" id="d2"></div><div class="pin-dot" id="d3"></div>
    </div>
    <div class="kpad">
      <button class="k" onclick="kp('1')">1</button><button class="k" onclick="kp('2')">2</button><button class="k" onclick="kp('3')">3</button>
      <button class="k" onclick="kp('4')">4</button><button class="k" onclick="kp('5')">5</button><button class="k" onclick="kp('6')">6</button>
      <button class="k" onclick="kp('7')">7</button><button class="k" onclick="kp('8')">8</button><button class="k" onclick="kp('9')">9</button>
      <button class="k empty"></button><button class="k" onclick="kp('0')">0</button><button class="k del" onclick="kdel()">⌫</button>
    </div>
    <div class="pin-err" id="pinErr"></div>
  </div>
</div>

<!-- ══ JOBS ══ -->
<div class="screen" id="jobs">
  <div class="app-hdr">
    <div class="app-logo">
      <div class="app-logo-mark"><svg viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="2.5" stroke-linecap="round"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg></div>
      <div class="app-logo-name">RoundSync</div>
    </div>
    <div class="app-meta">
      <div class="app-op" id="hdrOp">—</div>
      <div class="app-date" id="hdrDate">—</div>
    </div>
  </div>

  <div class="prog-track"><div class="prog-fill" id="progFill" style="width:0%"></div></div>

  <div class="filter-row">
    <div class="ftab on" id="ftAll"   onclick="setFilter('all',this)">All <span class="ftab-count" id="fcAll">0</span></div>
    <div class="ftab"    id="ftDue"   onclick="setFilter('due',this)">To Do <span class="ftab-count" id="fcDue">0</span></div>
    <div class="ftab"    id="ftDone"  onclick="setFilter('done',this)">Done <span class="ftab-count" id="fcDone">0</span></div>

function parseAddr(addr){
  const s=String(addr||'').trim();

  // JARVIS: "67- GREY WALSINGHAM RD" or "5-GREY WITHINGTON ROAD" or "- GREY KENILWORTH RD"
  const colourInAddr = s.match(/^(\d*[A-Za-z]?)\s*[-–]\s*(?:GREY|GREEN|BROWN|BLUE)\s+(.+)$/i);
  if(colourInAddr) return {house:colourInAddr[1].trim()||'', street:colourInAddr[2].trim(), bins:''};

  // JARVIS asterisk + bin count: "*187* X3 SEABANK RD"
  const asteriskBins = s.match(/^\*(\d+[A-Za-z]?)\*\s+(X\d+)\s+(.+)$/i);
  if(asteriskBins) return {house:asteriskBins[1], street:asteriskBins[3].trim(), bins:asteriskBins[2].toUpperCase()};

  // JARVIS asterisk only: "*55* CLIFF ROAD"
  const asterisk = s.match(/^\*(\d+[A-Za-z]?)\*\s+(.+)$/);
  if(asterisk) return {house:asterisk[1], street:asterisk[2].trim(), bins:''};

  // JARVIS bin count in address: "70 X2 SEABANK RD" or "70 X3 SEABANK RD"
  const withBins = s.match(/^(\d+[A-Za-z]?)\s+(X\d+)\s+(.+)$/i);
  if(withBins) return {house:withBins[1], street:withBins[3].trim(), bins:withBins[2].toUpperCase()};

  // Normal: "18 CLIFF ROAD"
  const normal = s.match(/^(\d+[A-Za-z]?(?:\s*[-–]\s*\d+[A-Za-z]?)?|\d+\s*@\s*\S+)\s+(.+)$/);
  if(normal) return {house:normal[1].trim(), street:normal[2].trim(), bins:''};

  return {house:'', street:s, bins:''};
}

function parseTags(job,bins){
  const notes=String(job.notes||'').toUpperCase();
  const addr=String(job.address||'').toUpperCase();
  const pay=String(job.payment_method||'').toLowerCase();
  const tags=[];

  // Bin count from address: X2, X3 etc
  if(bins) tags.push({cls:'tag-wb',txt:bins+' BINS'});

  // Bin colour — check notes AND address
  const colourSrc = notes + ' ' + addr;
  if(colourSrc.includes('GREY'))  tags.push({cls:'tag-grey', txt:'GREY'});
  if(colourSrc.includes('GREEN')) tags.push({cls:'tag-green',txt:'GREEN'});
  if(colourSrc.includes('BROWN')) tags.push({cls:'tag-brown',txt:'BROWN'});
  if(colourSrc.includes('BLUE'))  tags.push({cls:'tag-blue', txt:'BLUE'});

  // Frequency badge
  const freq=String(job.frequency||'').toUpperCase();
  if(freq.startsWith('F')||freq.includes('FORT')||freq.includes('14'))
    tags.push({cls:'tag-wb',txt:'F'});
  else if(freq.startsWith('M')||freq.includes('MONTH')||freq.includes('28'))
    tags.push({cls:'tag-wb',txt:'M'});
  else if(freq.startsWith('W')||freq.includes('WEEK'))
    tags.push({cls:'tag-wb',txt:'W'});

  // X1/X2/ADV credit — customer has paid ahead, no cash due today
  const notesUp=String(job.notes||'').toUpperCase();
  if(notesUp.match(/\bX\d+\b|\bADV\b|\bCREDIT\b/))
    tags.push({cls:'tag-green',txt:'CREDIT'});

  // Payment
  if(pay==='direct_debit'||notes.includes('DIRECT DEBIT')||notes.includes(' DD'))
    tags.push({cls:'tag-dd',txt:'DD'});
  else if(notes.includes('PAYPAL')||notes.includes('PAYPAL AUTO'))
    tags.push({cls:'tag-paypal',txt:'PayPal'});
  else{
    const pr=parseFloat(job.price||0);
    if(pr>0) tags.push({cls:'tag-cash',txt:'£'+pr.toFixed(2)});
  }
  return tags;
}

function jobNote(job){
  // Strip bin colours and payment methods — just show genuine notes
  let n=String(job.notes||'');
  n=n.replace(/\b(GREY|GREEN|BROWN|BLUE)\s*(BIN)?\b/gi,'')
     .replace(/\bDIRECT\s*DEBIT\b/gi,'').replace(/\bPAYPAL(\s*AUTO)?\b/gi,'')
     .replace(/\bDD\b/g,'').replace(/\|/g,' ').replace(/\s+/g,' ').trim();
  return n;
}

function filteredJobs(){

function makeStreetGroup(g){

  return el;

function makeJobRow(job){
  const parsed=parseAddr(job.address);
  const {house,bins}=parsed;
  const tags=parseTags(job,bins);
  const note=jobNote(job);
  const addr=String(job.address||'').trim();
  const pc=String(job.postcode||'').trim();
  const pr=parseFloat(job.price||0);
  const mapsUrl=`https://maps.google.com/?q=${encodeURIComponent(addr+(pc?' '+pc:''))}`;
  const rowCls=job.status==='done'?'done-row':job.status==='missed'?'missed-row':'';
  const doneCls=job.status==='done'?'on':'';
  const missCls=job.status==='missed'?'on':'';
  const retCls=job.status==='return'?'on':'';
  const notesUp=String(job.notes||'').toUpperCase();
  const dd=String(job.payment_method||'').toLowerCase()==='direct_debit'||notesUp.includes('DIRECT DEBIT');
  const pp=notesUp.includes('PAYPAL');
  const credit=notesUp.match(/\bX\d+\b|\bADV\b|\bCREDIT\b/);
  const priceDisplay=credit?'CREDIT':dd?'DD':pp?'PayPal':pr>0?`£${pr.toFixed(2)}`:'';

  return `<div class="job-row ${rowCls}" id="row-${job.id}">
    <div class="job-house">
      <div class="job-num">${house||'?'}</div>
      ${priceDisplay?`<div class="job-price-tag ${dd||pp?'auto':credit?'credit':''}">${priceDisplay}</div>`:''}
    </div>
    <div class="job-info">
      <div class="job-tags">
        ${tags.map(t=>`<span class="tag ${t.cls}">${t.txt}</span>`).join('')}
      </div>
      ${note?`<div class="job-note-txt">📋 ${note}</div>`:''}
    </div>
    <div class="job-btns">
      <button class="jb" onclick="toggleDetail('${job.id}')" title="Notes/Photo" style="background:rgba(255,255,255,.06);color:var(--muted)">⋮</button>
      <button class="jb jb-map"  onclick="window.open('${mapsUrl}','_blank')" title="Map">📍</button>
      <button class="jb jb-ret ${retCls}"  onclick="setSt('${job.id}','return')" title="Return">↩</button>
      <button class="jb jb-miss ${missCls}" onclick="setSt('${job.id}','missed')" title="Missed">✗</button>
      <button class="jb jb-done ${doneCls}" onclick="setSt('${job.id}','done')"   title="Done">✓</button>
    </div>
  </div>
  <div class="job-detail" id="detail-${job.id}">
    ${note?`<div class="detail-notes">📋 ${note}</div>`:`<div class="detail-note-empty">No notes for this job</div>`}
    <div class="detail-row">
      <textarea class="note-input" id="noteinput-${job.id}" placeholder="Add a note…" rows="1"></textarea>
      <button class="note-save-btn" onclick="saveNote('${job.id}')">Save</button>
    </div>
    <button class="photo-btn" onclick="document.getElementById('photo-${job.id}').click()">
      📷 Take / Upload Photo
    </button>
    <input type="file" accept="image/*" capture="environment" class="photo-input" id="photo-${job.id}" onchange="handlePhoto('${job.id}',this)">
    <img class="photo-preview" id="prev-${job.id}">
  </div>`;}

function toggleDetail(id){
  const el=document.getElementById(`detail-${id}`);
  if(el) el.classList.toggle('open');
}

async function saveNote(id){
  const input=document.getElementById(`noteinput-${id}`);
  const txt=input.value.trim();
  if(!txt) return;
  const job=jobs.find(j=>j.id===id);
  if(!job) return;

  // Append to existing notes
  const existing=String(job.notes||'');
  const stamp=new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
  job.notes=existing?(existing+'\n'+stamp+': '+txt):(stamp+': '+txt);
  input.value='';
  toast('Note saved','s');

  // Update in Supabase
  if(!DEMO){
    try{
      await sb.from('jobs_live').update({notes:job.notes}).eq('id',id);
    }catch(e){ console.error(e); }
  }

  // Refresh detail panel note display
  const detail=document.getElementById(`detail-${id}`);
  if(detail){
    const noteEl=detail.querySelector('.detail-notes,.detail-note-empty');
    if(noteEl){ noteEl.className='detail-notes'; noteEl.textContent='📋 '+job.notes; }
  }
}

function handlePhoto(id,input){
  const file=input.files[0];
  if(!file) return;
  const prev=document.getElementById(`prev-${id}`);
  const reader=new FileReader();
  reader.onload=async e=>{
    prev.src=e.target.result;
    prev.style.display='block';
    toast('Photo attached ✓','s');
    // Store photo in Supabase Storage if available
    if(!DEMO && sb){
      try{
        const fileName=`${id}_${Date.now()}.jpg`;
        const {error}=await sb.storage.from('job-photos').upload(fileName,file,{contentType:file.type,upsert:true});
        if(!error){
          const {data}=sb.storage.from('job-photos').getPublicUrl(fileName);
          if(data?.publicUrl){
            const job=jobs.find(j=>j.id===id);
            const note='📷 Photo: '+data.publicUrl;
            const existing=String(job?.notes||'');
            const updated=existing?(existing+'\n'+note):note;
            await sb.from('jobs_live').update({notes:updated}).eq('id',id);
          }
        }
      }catch(e){ console.log('Photo upload skipped (storage not set up):',e.message); }
    }
  };
  reader.readAsDataURL(file);
}

function escId(s){ return String(s||'').replace(/'/g,"\\'"); }

function toggleGroup(hdr){ hdr.closest('.street-group').classList.toggle('collapsed'); }

async function markStreetDone(btn,street,pc){
  const toMark=jobs.filter(j=>{
    const{street:s}=parseAddr(j.address);
    const k=(s||j.address||'')+'|'+(j.postcode||'');
    const target=street+'|'+pc;
    return k===target && j.status==='pending';
  });
  for(const j of toMark) await applyStatus(j,'done',null,null);
}

// ══════════════════════════════════════
// STATUS UPDATES
// ══════════════════════════════════════
async function setSt(id,status){
  const job=jobs.find(j=>j.id===id);
  if(!job) return;
  const pay=String(job.payment_method||'').toLowerCase();
  const notesUp=String(job.notes||'').toUpperCase();
  const dd=pay==='direct_debit'||notesUp.includes('DIRECT DEBIT');
  const pp=notesUp.includes('PAYPAL');
  const credit=notesUp.match(/\bX\d+\b|\bADV\b|\bCREDIT\b/);
  if(status==='done'&&!dd&&!pp&&!credit){ payJob=job; openPayModal(job); return; }
  await applyStatus(job,status,null,null);
}

async function applyStatus(job,status,amt,method){
  job.status=status;
  if(amt){ job.payment_amount=amt; job.payment_method=method; job.payment_status='paid'; }
  render();
  const ch={job_id:job.id,status,amt,method,ts:new Date().toISOString()};
  if(navigator.onLine&&!DEMO) await push(ch);
  else{ queue.push(ch); localStorage.setItem('rs_q',JSON.stringify(queue)); updateBadge(); }
  const addr=String(job.address||'').split(' ').slice(0,3).join(' ');
  if(status==='done')   toast('✓ '+addr,'s');
  if(status==='missed') toast('✗ '+addr+' missed','e');
  if(status==='return') toast('↩ '+addr+' return','w');
}

async function push(ch){
  try{
    const u={status:ch.status,completed_at:ch.ts};
    if(ch.amt){u.payment_amount=ch.amt;u.payment_method=ch.method;u.payment_status='paid';}
    await sb.from('jobs_live').update(u).eq('id',ch.job_id);
    if(ch.amt) await sb.from('payments').insert({
      company_id:op.company_id,job_id:ch.job_id,
      operative_id:op.id,amount:ch.amt,method:ch.method
    });
  }catch{
    queue.push(ch); localStorage.setItem('rs_q',JSON.stringify(queue)); updateBadge();
  }
}

async function flush(){
  if(DEMO||!queue.length) return;
  toast(`Syncing ${queue.length}…`,'i');
  const q=[...queue]; queue=[]; localStorage.setItem('rs_q','[]'); updateBadge();
  for(const c of q) await push(c);
  toast('Synced ✓','s');
}

async function doSync(){ await flush(); if(!DEMO) await fetchJobs(); else toast('Demo mode','i'); }
function updateBadge(){ const b=document.getElementById('syncCnt'); b.style.display=queue.length?'inline':'none'; b.textContent=queue.length; }

// ══════════════════════════════════════
// PAYMENT MODAL
// ══════════════════════════════════════
function openPayModal(job){
  const pr=parseFloat(job.price||0);
  const addr=String(job.address||'').split(',')[0];
  document.getElementById('payAddr').textContent=addr||'Customer';
  document.getElementById('payAmt').textContent=`£${pr.toFixed(2)}`;
  payMeth='cash';
  document.getElementById('mCash').classList.add('sel');
  document.getElementById('mCard').classList.remove('sel');
  document.getElementById('payModal').classList.add('open');
}
function pickMeth(m){ payMeth=m; document.getElementById('mCash').classList.toggle('sel',m==='cash'); document.getElementById('mCard').classList.toggle('sel',m==='card'); }
async function confirmPay(){
  if(!payJob) return;
  const pr=parseFloat(payJob.price||0);
  document.getElementById('payModal').classList.remove('open');
  await applyStatus(payJob,'done',pr,payMeth);
  payJob=null;
}
async function skipPay(){
  document.getElementById('payModal').classList.remove('open');
  if(payJob){ await applyStatus(payJob,'done',null,null); payJob=null; }
}

// ══════════════════════════════════════
// STATS + FILTERS
// ══════════════════════════════════════
function updateStats(){
  const done  =jobs.filter(j=>j.status==='done').length;
  const miss  =jobs.filter(j=>j.status==='missed').length;
  const ret   =jobs.filter(j=>j.status==='return').length;
  const left  =jobs.filter(j=>j.status==='pending'||j.status==='return').length;
  const cash  =jobs.reduce((s,j)=>s+parseFloat(j.payment_amount||0),0);
  const total =jobs.length;
  document.getElementById('sDone').textContent=done;
  document.getElementById('sMiss').textContent=miss;
  document.getElementById('sRet').textContent=ret;
  document.getElementById('sLeft').textContent=left;
  document.getElementById('sCash').textContent=`£${cash.toFixed(0)}`;
  document.getElementById('progFill').style.width=total?Math.round(((done+miss)/total)*100)+'%':'0%';

  // Filter counts
  document.getElementById('fcAll').textContent=total;
  document.getElementById('fcDue').textContent=left;
  document.getElementById('fcDone').textContent=done;
  document.getElementById('fcMiss').textContent=miss;
  document.getElementById('fcRet').textContent=ret;
}

function setFilter(f,el){
  curFilter=f;
  document.querySelectorAll('.ftab').forEach(t=>t.classList.remove('on'));
  el.classList.add('on');
  render();
}

function toggleWhatsLeft(){
  whatsLeftOnly=!whatsLeftOnly;
  document.getElementById('whatsLeftBtn').classList.toggle('active',whatsLeftOnly);
  render();
}

// ══════════════════════════════════════
// LOGOUT + HELPERS
// ══════════════════════════════════════
function doLogout(){
  if(queue.length&&!DEMO&&!confirm(`${queue.length} unsynced — logout?`)) return;
  localStorage.removeItem('rs_op');
  op=null;jobs=[];pin='';dots();
  document.getElementById('jobs').classList.remove('active');
  document.getElementById('login').classList.add('active');
  document.getElementById('pinErr').textContent='';
}
function load(t='Loading…'){ document.getElementById('loaderTxt').textContent=t; document.getElementById('loader').classList.add('show'); }
function hide(){ document.getElementById('loader').classList.remove('show'); }
let _tt;
function toast(msg,type=''){
  const el=document.getElementById('toast');
  el.textContent=msg; el.className=`toast show ${type}`;
  clearTimeout(_tt); _tt=setTimeout(()=>el.classList.remove('show'),2800);
}
const wait=ms=>new Promise(r=>setTimeout(r,ms));
</script>
