<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="RoundSync">
<meta name="theme-color" content="#0D0D0D">
<title>RoundSync Field</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
/* ═══════════════════════════════════════
   RESET & BASE
═══════════════════════════════════════ */
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}

:root{
  --black:    #0D0D0D;
  --surface:  #161616;
  --card:     #1E1E1E;
  --card-2:   #252525;
  --line:     rgba(255,255,255,.07);
  --white:    #F5F5F0;
  --muted:    rgba(245,245,240,.35);
  --muted2:   rgba(245,245,240,.15);
  --green:    #00E676;
  --green-d:  #00C060;
  --red:      #FF3D57;
  --amber:    #FFB300;
  --blue:     #2979FF;
  --mono:     'JetBrains Mono', monospace;
  --body:     'Outfit', sans-serif;
}

html,body{
  font-family:var(--body);
  background:var(--black);
  color:var(--white);
  min-height:100vh;
  max-width:430px;
  margin:0 auto;
  overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
}

/* ═══════════════════════════════════════
   SCREENS
═══════════════════════════════════════ */
.screen{display:none;min-height:100vh;flex-direction:column}
.screen.active{display:flex}

/* ═══════════════════════════════════════
   OVERLAYS
═══════════════════════════════════════ */
.loader{
  display:none;position:fixed;inset:0;
  background:rgba(13,13,13,.9);
  backdrop-filter:blur(12px);
  z-index:999;align-items:center;
  justify-content:center;flex-direction:column;gap:16px;
}
.loader.show{display:flex}
.spin{
  width:32px;height:32px;
  border:2px solid var(--line);
  border-top-color:var(--green);
  border-radius:50%;
  animation:spin .6s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.load-txt{
  font-family:var(--mono);font-size:.72rem;
  color:var(--muted);letter-spacing:.5px;
}

.toast{
  position:fixed;top:20px;left:50%;
  transform:translateX(-50%) translateY(-90px);
  padding:10px 20px;border-radius:100px;
  font-family:var(--mono);font-size:.75rem;font-weight:500;
  z-index:998;transition:transform .3s cubic-bezier(.16,1,.3,1);
  white-space:nowrap;letter-spacing:.3px;
}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.success{background:var(--green);color:#000}
.toast.error  {background:var(--red);color:#fff}
.toast.info   {background:var(--blue);color:#fff}
.toast.warn   {background:var(--amber);color:#000}

.offline-pill{
  display:none;position:fixed;bottom:90px;left:50%;
  transform:translateX(-50%);
  background:var(--amber);color:#000;
  font-family:var(--mono);font-size:.68rem;font-weight:700;
  padding:6px 16px;border-radius:100px;z-index:50;
  letter-spacing:.3px;
}
body.offline .offline-pill{display:block}

/* ═══════════════════════════════════════
   LOGIN
═══════════════════════════════════════ */
#loginScreen{
  background:var(--black);
  align-items:center;justify-content:center;
  padding:40px 32px;
  position:relative;
}

/* Subtle grid bg */
#loginScreen::before{
  content:'';position:absolute;inset:0;
  background-image:
    linear-gradient(rgba(0,230,118,.03) 1px,transparent 1px),
    linear-gradient(90deg,rgba(0,230,118,.03) 1px,transparent 1px);
  background-size:32px 32px;
  pointer-events:none;
}
/* Green glow */
#loginScreen::after{
  content:'';position:absolute;
  width:280px;height:280px;
  background:radial-gradient(circle,rgba(0,230,118,.08),transparent 70%);
  top:30%;left:50%;transform:translate(-50%,-50%);
  pointer-events:none;
}

.login-wrap{
  position:relative;z-index:2;
  width:100%;max-width:320px;
  display:flex;flex-direction:column;align-items:center;
}

.brand{
  display:flex;align-items:center;gap:10px;
  margin-bottom:6px;
}
.brand-mark{
  width:36px;height:36px;
  background:var(--green);
  border-radius:10px;
  display:flex;align-items:center;justify-content:center;
}
.brand-mark svg{width:20px;height:20px}
.brand-name{
  font-size:1.6rem;font-weight:800;
  color:var(--white);letter-spacing:-1px;
}
.brand-sub{
  font-family:var(--mono);font-size:.65rem;
  color:var(--muted);letter-spacing:3px;
  text-transform:uppercase;margin-bottom:52px;
}

.pin-label{
  font-family:var(--mono);font-size:.65rem;
  color:var(--muted);letter-spacing:2px;
  text-transform:uppercase;margin-bottom:20px;
}
.pin-row{
  display:flex;gap:16px;margin-bottom:40px;
}
.pin-dot{
  width:12px;height:12px;border-radius:50%;
  border:1.5px solid rgba(255,255,255,.2);
  transition:all .2s;
}
.pin-dot.on{
  background:var(--green);
  border-color:var(--green);
  box-shadow:0 0 14px rgba(0,230,118,.5);
}

/* Keypad */
.keypad{
  display:grid;grid-template-columns:repeat(3,1fr);
  gap:10px;width:100%;
}
.k{
  aspect-ratio:1;
  background:var(--surface);
  border:1px solid var(--line);
  border-radius:16px;
  color:var(--white);
  font-family:var(--body);font-size:1.5rem;font-weight:700;
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .12s;
  position:relative;overflow:hidden;
}
.k:active{
  background:var(--card-2);
  transform:scale(.93);
}
.k.del{
  background:transparent;
  color:var(--muted);font-size:.95rem;
  border-color:transparent;
}
.k.empty{pointer-events:none;background:transparent;border:transparent}

.pin-err{
  font-family:var(--mono);font-size:.72rem;
  color:var(--red);text-align:center;
  margin-top:20px;min-height:16px;
  letter-spacing:.3px;
}

/* ═══════════════════════════════════════
   JOB SCREEN
═══════════════════════════════════════ */
#jobScreen{background:var(--black)}

/* Header */
.hdr{
  padding:16px 18px 12px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:40;
  background:rgba(13,13,13,.92);
  backdrop-filter:blur(20px);
  border-bottom:1px solid var(--line);
}
.hdr-left{display:flex;align-items:center;gap:10px}
.hdr-mark{
  width:28px;height:28px;background:var(--green);
  border-radius:8px;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}
.hdr-mark svg{width:16px;height:16px}
.hdr-name{
  font-size:.95rem;font-weight:800;color:var(--white);
  letter-spacing:-.3px;
}
.hdr-right{text-align:right}
.hdr-op{
  font-size:.85rem;font-weight:700;color:var(--white);
}
.hdr-date{
  font-family:var(--mono);font-size:.62rem;
  color:var(--muted);margin-top:1px;
}

/* Progress bar */
.prog-track{
  height:2px;background:var(--line);
}
.prog-fill{
  height:100%;
  background:linear-gradient(90deg,var(--green),#00BCD4);
  transition:width .8s cubic-bezier(.16,1,.3,1);
}

/* Stats */
.stats{
  display:grid;grid-template-columns:repeat(4,1fr);
  background:var(--surface);
  border-bottom:1px solid var(--line);
}
.stat{
  padding:12px 8px;text-align:center;
  border-right:1px solid var(--line);
}
.stat:last-child{border-right:none}
.stat-n{
  font-family:var(--body);font-size:1.5rem;font-weight:800;
  line-height:1;color:var(--white);
}
.stat-n.g{color:var(--green)}
.stat-n.r{color:var(--red)}
.stat-n.a{color:var(--amber)}
.stat-k{
  font-family:var(--mono);font-size:.57rem;
  color:var(--muted);text-transform:uppercase;
  letter-spacing:.5px;margin-top:3px;
}

/* Job list */
.job-list{
  flex:1;padding:12px 12px 100px;
  display:flex;flex-direction:column;gap:8px;
  overflow-y:auto;-webkit-overflow-scrolling:touch;
}

.section-lbl{
  font-family:var(--mono);font-size:.6rem;
  color:var(--muted);text-transform:uppercase;
  letter-spacing:1.5px;padding:8px 4px 2px;
}

/* Job card */
.job{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:16px;
  overflow:hidden;
  transition:opacity .4s,transform .3s;
  animation:cardIn .3s cubic-bezier(.16,1,.3,1) both;
}
@keyframes cardIn{
  from{opacity:0;transform:translateY(12px)}
  to{opacity:1;transform:translateY(0)}
}
.job.done,.job.missed{opacity:.5}

/* Left accent stripe */
.job-inner{
  display:flex;position:relative;
}
.job-stripe{
  width:3px;flex-shrink:0;
  background:var(--line);
  transition:background .3s;
}
.job.done   .job-stripe{background:var(--green)}
.job.missed .job-stripe{background:var(--red)}
.job.return .job-stripe{background:var(--amber)}

.job-body{flex:1;padding:14px 14px 12px}

/* Top row */
.job-top{
  display:flex;align-items:flex-start;
  justify-content:space-between;margin-bottom:6px;
}
.job-name{
  font-size:.65rem;font-weight:600;
  color:var(--muted);letter-spacing:1px;
  text-transform:uppercase;font-family:var(--mono);
}
.job-addr{
  font-family:var(--body);font-size:.95rem;font-weight:700;
  color:var(--white);margin-top:3px;line-height:1.4;
  letter-spacing:-.2px;
}
.job-price{
  font-family:var(--body);font-size:1rem;font-weight:800;
  color:var(--green);margin-left:12px;white-space:nowrap;
  flex-shrink:0;
}

/* Note */
.job-note{
  background:rgba(255,179,0,.08);
  border:1px solid rgba(255,179,0,.2);
  border-radius:8px;padding:6px 10px;
  font-family:var(--mono);font-size:.68rem;
  color:var(--amber);margin:8px 0;
  display:flex;gap:6px;align-items:flex-start;
}

/* Payment badge */
.job-badge{
  display:inline-flex;align-items:center;gap:5px;
  padding:3px 9px;border-radius:100px;
  font-family:var(--mono);font-size:.62rem;font-weight:500;
  background:var(--card-2);color:var(--muted);
  margin-bottom:10px;letter-spacing:.3px;
}
.job-badge.dd{
  background:rgba(41,121,255,.12);
  color:rgba(41,121,255,.9);
}

/* Action buttons */
.job-acts{
  display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;
}
.jbtn{
  padding:9px 4px;border:none;border-radius:10px;
  font-family:var(--body);font-weight:700;font-size:.78rem;
  cursor:pointer;display:flex;align-items:center;
  justify-content:center;gap:5px;
  transition:all .15s;letter-spacing:-.1px;
}
.jbtn:active{transform:scale(.92)}
.jbtn-done  {background:rgba(0,230,118,.1);color:var(--green)}
.jbtn-miss  {background:rgba(255,61,87,.1);color:var(--red)}
.jbtn-ret   {background:rgba(255,179,0,.1);color:var(--amber)}
.jbtn-done.on  {background:var(--green);color:#000}
.jbtn-miss.on  {background:var(--red);color:#fff}
.jbtn-ret.on   {background:var(--amber);color:#000}

/* Done/missed labels */
.done-lbl,.miss-lbl,.ret-lbl{
  display:none;
  font-family:var(--mono);font-size:.7rem;font-weight:500;
  text-align:center;padding:6px 0 2px;letter-spacing:.3px;
}
.job.done   .done-lbl{display:block;color:var(--green)}
.job.missed .miss-lbl{display:block;color:var(--red)}
.job.return .ret-lbl {display:block;color:var(--amber)}

/* Empty state */
.empty{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:60px 24px;text-align:center;
}
.empty-icon{
  width:64px;height:64px;
  background:var(--surface);border-radius:20px;
  display:flex;align-items:center;justify-content:center;
  margin-bottom:20px;
  font-size:2rem;
}
.empty h3{
  font-size:1.1rem;font-weight:700;
  color:var(--muted);margin-bottom:6px;
}
.empty p{
  font-family:var(--mono);font-size:.75rem;
  color:var(--muted2);
}

/* Footer */
.footer{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:430px;
  padding:10px 14px 28px;
  background:rgba(13,13,13,.95);
  backdrop-filter:blur(20px);
  border-top:1px solid var(--line);
  display:grid;grid-template-columns:1fr auto;gap:8px;
  z-index:40;
}
.sync-btn{
  background:var(--green);color:#000;
  border:none;border-radius:12px;
  padding:13px 20px;
  font-family:var(--body);font-weight:800;font-size:.88rem;
  cursor:pointer;display:flex;align-items:center;
  justify-content:center;gap:8px;
  transition:all .2s;letter-spacing:-.2px;
}
.sync-btn:active{transform:scale(.96);background:var(--green-d)}
.sync-cnt{
  background:#000;color:var(--green);
  font-family:var(--mono);font-size:.62rem;font-weight:700;
  padding:1px 7px;border-radius:100px;
  display:none;
}
.logout-btn{
  background:var(--surface);
  border:1px solid var(--line);
  color:var(--muted);border-radius:12px;
  padding:13px 16px;font-size:.8rem;
  cursor:pointer;font-family:var(--body);font-weight:600;
  transition:all .2s;
}
.logout-btn:active{transform:scale(.93)}

/* ═══════════════════════════════════════
   PAYMENT MODAL
═══════════════════════════════════════ */
.modal-bg{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.7);
  backdrop-filter:blur(8px);
  z-index:200;align-items:flex-end;
}
.modal-bg.open{display:flex}
.modal{
  background:var(--surface);
  border-radius:24px 24px 0 0;
  border:1px solid var(--line);
  border-bottom:none;
  padding:8px 24px 48px;
  width:100%;max-width:430px;
  margin:0 auto;
  animation:slideUp .3s cubic-bezier(.16,1,.3,1);
}
@keyframes slideUp{
  from{transform:translateY(100%)}
  to{transform:translateY(0)}
}
.modal-handle{
  width:36px;height:4px;
  background:var(--line);border-radius:2px;
  margin:12px auto 24px;
}
.modal-title{
  font-size:1.3rem;font-weight:800;
  color:var(--white);margin-bottom:3px;
  letter-spacing:-.3px;
}
.modal-cust{
  font-family:var(--mono);font-size:.75rem;
  color:var(--muted);margin-bottom:20px;
}
.modal-amt{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:16px;
  padding:20px;text-align:center;
  font-size:2.6rem;font-weight:900;
  color:var(--green);margin-bottom:18px;
  letter-spacing:-1px;
}
.modal-methods{
  display:grid;grid-template-columns:1fr 1fr;gap:8px;
  margin-bottom:16px;
}
.meth{
  padding:14px;border:1.5px solid var(--line);
  border-radius:12px;background:var(--card);
  font-family:var(--body);font-weight:700;font-size:.88rem;
  cursor:pointer;display:flex;align-items:center;
  justify-content:center;gap:8px;color:var(--muted);
  transition:all .2s;
}
.meth.sel{
  border-color:var(--green);
  background:rgba(0,230,118,.08);
  color:var(--green);
}
.modal-confirm{
  width:100%;padding:15px;border:none;
  border-radius:12px;
  background:var(--green);color:#000;
  font-family:var(--body);font-weight:800;font-size:.95rem;
  cursor:pointer;margin-bottom:10px;
  transition:all .2s;letter-spacing:-.2px;
}
.modal-confirm:active{transform:scale(.97);background:var(--green-d)}
.modal-skip{
  width:100%;padding:10px;background:transparent;
  border:none;font-family:var(--mono);font-size:.75rem;
  color:var(--muted);cursor:pointer;letter-spacing:.3px;
}
</style>
</head>
<body>

<div class="offline-pill">⚡ Offline — changes queued</div>
<div class="loader" id="loader">
  <div class="spin"></div>
  <div class="load-txt" id="loaderTxt">Loading…</div>
</div>
<div class="toast" id="toast"></div>

<!-- PAYMENT MODAL -->
<div class="modal-bg" id="payModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">Record Payment</div>
    <div class="modal-cust" id="payName"></div>
    <div class="modal-amt" id="payAmt">£0.00</div>
    <div class="modal-methods">
      <button class="meth sel" id="mCash" onclick="pickMethod('cash')">💵 Cash</button>
      <button class="meth"     id="mCard" onclick="pickMethod('card')">💳 Card</button>
    </div>
    <button class="modal-confirm" onclick="confirmPay()">✓ Confirm Payment</button>
    <button class="modal-skip"    onclick="skipPay()">No payment — skip</button>
  </div>
</div>

<!-- ════ LOGIN ════ -->
<div class="screen active" id="loginScreen">
  <div class="login-wrap">
    <div class="brand">
      <div class="brand-mark">
        <svg viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="2.5" stroke-linecap="round">
          <path d="M12 2L2 7l10 5 10-5-10-5z"/>
          <path d="M2 17l10 5 10-5"/>
          <path d="M2 12l10 5 10-5"/>
        </svg>
      </div>
      <div class="brand-name">RoundSync</div>
    </div>
    <div class="brand-sub">Field Operative</div>

    <div class="pin-label">Enter your PIN</div>
    <div class="pin-row">
      <div class="pin-dot" id="d0"></div>
      <div class="pin-dot" id="d1"></div>
      <div class="pin-dot" id="d2"></div>
      <div class="pin-dot" id="d3"></div>
    </div>

    <div class="keypad">
      <button class="k" onclick="kp('1')">1</button>
      <button class="k" onclick="kp('2')">2</button>
      <button class="k" onclick="kp('3')">3</button>
      <button class="k" onclick="kp('4')">4</button>
      <button class="k" onclick="kp('5')">5</button>
      <button class="k" onclick="kp('6')">6</button>
      <button class="k" onclick="kp('7')">7</button>
      <button class="k" onclick="kp('8')">8</button>
      <button class="k" onclick="kp('9')">9</button>
      <button class="k empty"></button>
      <button class="k" onclick="kp('0')">0</button>
      <button class="k del" onclick="kdel()">⌫</button>
    </div>
    <div class="pin-err" id="pinErr"></div>
  </div>
</div>

<!-- ════ JOBS ════ -->
<div class="screen" id="jobScreen">
  <div class="hdr">
    <div class="hdr-left">
      <div class="hdr-mark">
        <svg viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="2.5" stroke-linecap="round">
          <path d="M12 2L2 7l10 5 10-5-10-5z"/>
          <path d="M2 17l10 5 10-5"/>
          <path d="M2 12l10 5 10-5"/>
        </svg>
      </div>
      <div class="hdr-name">RoundSync</div>
    </div>
    <div class="hdr-right">
      <div class="hdr-op" id="hdrOp">—</div>
      <div class="hdr-date" id="hdrDate">—</div>
    </div>
  </div>

  <div class="prog-track"><div class="prog-fill" id="progFill" style="width:0%"></div></div>

  <div class="stats">
    <div class="stat"><div class="stat-n g" id="sDone">0</div><div class="stat-k">Done</div></div>
    <div class="stat"><div class="stat-n"   id="sLeft">0</div><div class="stat-k">Left</div></div>
    <div class="stat"><div class="stat-n r" id="sMiss">0</div><div class="stat-k">Missed</div></div>
    <div class="stat"><div class="stat-n a" id="sCash">£0</div><div class="stat-k">Cash In</div></div>
  </div>

  <div class="job-list" id="jobList"></div>

  <div class="footer">
    <button class="sync-btn" onclick="doSync()">
      ↑ Sync
      <span class="sync-cnt" id="syncCnt">0</span>
    </button>
    <button class="logout-btn" onclick="doLogout()">⏻</button>
  </div>
</div>

<script>
// ═══════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════
const SB_URL = 'https://bqyvofnljjnffarkwzio.supabase.co';

const DEMO = false;

const DEMO_OP = {id:'demo-pete', name:'Pete', company_id:'demo-co'};
const DEMO_JOBS = [
  {id:'j1',status:'pending',customer:{name:'Mrs Johnson',   address:'14 Acacia Ave, Birkenhead', notes:'',                         price:4.00,payment_method:'cash'}},
  {id:'j2',status:'pending',customer:{name:'Mr Taylor',     address:'7 Elm Road, Prenton',        notes:'Side gate — blue bin only', price:4.00,payment_method:'cash'}},
  {id:'j3',status:'pending',customer:{name:'Davies',        address:'23 Oak Street, Upton',        notes:'',                         price:4.50,payment_method:'direct_debit'}},
  {id:'j4',status:'pending',customer:{name:'Patel',         address:'55 Maple Close, Bromborough', notes:'',                         price:4.00,payment_method:'cash'}},
  {id:'j5',status:'pending',customer:{name:'Smith',         address:'8 Cedar Lane, Heswall',       notes:'',                         price:4.00,payment_method:'cash'}},
];

let sb, op, jobs=[], pin='', payJob=null, payMethod='cash';
let queue = JSON.parse(localStorage.getItem('rs_q')||'[]');

// ═══════════════════════════════════════
// INIT
// ═══════════════════════════════════════
document.addEventListener('DOMContentLoaded',()=>{
  if(!DEMO) sb = supabase.createClient(SB_URL,SB_KEY);
  document.getElementById('hdrDate').textContent =
    new Date().toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'});
  window.addEventListener('online', ()=>{ document.body.classList.remove('offline'); flush(); });
  window.addEventListener('offline',()=>  document.body.classList.add('offline'));
  if(!navigator.onLine) document.body.classList.add('offline');
  const saved = localStorage.getItem('rs_op');
  if(saved){ op=JSON.parse(saved); enterJobs(); }
  updateBadge();
});

// ═══════════════════════════════════════
// PIN
// ═══════════════════════════════════════
function kp(d){
  if(pin.length>=4) return;
  pin+=d; dots();
  if(pin.length===4) setTimeout(tryLogin,120);
}
function kdel(){ pin=pin.slice(0,-1); dots(); document.getElementById('pinErr').textContent=''; }
function dots(){
  for(let i=0;i<4;i++)
    document.getElementById('d'+i).classList.toggle('on',i<pin.length);
}

async function tryLogin(){
  load('Checking PIN…');
  if(DEMO){
    await wait(400);
    op=DEMO_OP; localStorage.setItem('rs_op',JSON.stringify(op));
    hide(); enterJobs(); return;
  }
  try{
    const {data,error}=await sb.from('operatives').select('*').eq('pin',pin).eq('active',true).single();
    if(error||!data){
      hide();
      document.getElementById('pinErr').textContent='Incorrect PIN — try again';
      pin=''; dots(); return;
    }
    op=data; localStorage.setItem('rs_op',JSON.stringify(data));
    hide(); enterJobs();
  }catch{
    hide();
    document.getElementById('pinErr').textContent='Connection error — check signal';
    pin=''; dots();
  }
}

// ═══════════════════════════════════════
// JOB SCREEN
// ═══════════════════════════════════════
async function enterJobs(){
  document.getElementById('loginScreen').classList.remove('active');
  document.getElementById('jobScreen').classList.add('active');
  document.getElementById('hdrOp').textContent = op.name;
  await fetchJobs();
}

async function fetchJobs(){
  load("Loading today's round…");
  if(DEMO){
    await wait(600);
    jobs=DEMO_JOBS.map(j=>({...j,customer:{...j.customer}}));
    hide(); render(); return;
  }
  try{
    const today=new Date().toISOString().split('T')[0];
    const {data,error}=await sb.from('jobs_live')
      .select('*, customer:customers(name,address,postcode,notes,price,payment_method)')
      .eq('operative_id',op.id).eq('scheduled_date',today).order('created_at');
    if(error) throw error;
    jobs=data||[];
    queue.forEach(q=>{
      const j=jobs.find(x=>x.id===q.job_id);
      if(j){ j.status=q.status; if(q.amt){j.payment_amount=q.amt;j.payment_status='paid';} }
    });
    hide(); render();
  }catch{ hide(); toast('Could not load jobs','error'); }
}

function render(){
  const list=document.getElementById('jobList');
  list.innerHTML='';
  const pending=jobs.filter(j=>j.status==='pending'||j.status==='return');
  const done   =jobs.filter(j=>j.status==='done'||j.status==='missed');

  if(!jobs.length){
    list.innerHTML=`<div class="empty"><div class="empty-icon">🎉</div><h3>All done!</h3><p>No jobs scheduled today.</p></div>`;
  } else {
    if(pending.length){ addLbl(list,`To Do — ${pending.length} remaining`); pending.forEach(j=>list.appendChild(card(j))); }
    if(done.length)   { addLbl(list,`Completed — ${done.length}`);          done.forEach(j=>list.appendChild(card(j)));    }
  }
  stats();
}

function addLbl(p,t){
  const d=document.createElement('div');
  d.className='section-lbl';d.textContent=t;p.appendChild(d);
}

function card(job){
  const c=job.customer||{};
  const dd=c.payment_method==='direct_debit';
  const pr=parseFloat(c.price||job.price||0);
  const el=document.createElement('div');
  el.className=`job ${job.status}`;
  el.id=`card-${job.id}`;
  el.innerHTML=`
    <div class="job-inner">
      <div class="job-stripe"></div>
      <div class="job-body">
        <div class="job-top">
          <div>
            <div class="job-name">Job #${String(jobs.indexOf(job)+1).padStart(3,'0')}</div>
            <div class="job-addr">${c.address||''}${c.postcode?' · '+c.postcode:''}</div>
          </div>
          <div class="job-price">£${pr.toFixed(2)}</div>
        </div>
        ${c.notes?`<div class="job-note">📋 ${c.notes}</div>`:''}
        <div class="job-badge ${dd?'dd':''}">${dd?'🔄 Direct Debit':'💷 Cash / Card'}</div>
        <div class="job-acts">
          <button class="jbtn jbtn-done  ${job.status==='done'  ?'on':''}" onclick="setStatus('${job.id}','done')">  ✓ Done</button>
          <button class="jbtn jbtn-miss  ${job.status==='missed'?'on':''}" onclick="setStatus('${job.id}','missed')">✗ Missed</button>
          <button class="jbtn jbtn-ret   ${job.status==='return'?'on':''}" onclick="setStatus('${job.id}','return')">↩ Return</button>
        </div>
        <div class="done-lbl">✓ Cleaned</div>
        <div class="miss-lbl">✗ Missed — flagged</div>
        <div class="ret-lbl">↩ Return visit</div>
      </div>
    </div>`;
  return el;
}

// ═══════════════════════════════════════
// STATUS
// ═══════════════════════════════════════
async function setStatus(id,status){
  const job=jobs.find(j=>j.id===id);
  if(!job) return;
  const dd=(job.customer||{}).payment_method==='direct_debit';
  if(status==='done'&&!dd){ payJob=job; openPay(job); return; }
  await apply(job,status,null,null);
}

async function apply(job,status,amt,method){
  job.status=status;
  if(amt){ job.payment_amount=amt; job.payment_method=method; job.payment_status='paid'; }
  render();
  const ch={job_id:job.id,status,amt,method,ts:new Date().toISOString()};
  if(navigator.onLine&&!DEMO){ await push(ch); }
  else { queue.push(ch); localStorage.setItem('rs_q',JSON.stringify(queue)); updateBadge(); }
  const n=(job.customer||{}).name||'Customer';
  if(status==='done')   toast(`✓ ${n}`,       'success');
  if(status==='missed') toast(`✗ ${n} missed`, 'error');
  if(status==='return') toast(`↩ ${n} — return`,'warn');
}

async function push(ch){
  try{
    const u={status:ch.status,completed_at:ch.ts};
    if(ch.amt){ u.payment_amount=ch.amt; u.payment_method=ch.method; u.payment_status='paid'; }
    await sb.from('jobs_live').update(u).eq('id',ch.job_id);
    if(ch.amt) await sb.from('payments').insert({
      company_id:op.company_id,job_id:ch.job_id,
      operative_id:op.id,amount:ch.amt,method:ch.method,
    });
  }catch{
    queue.push(ch);
    localStorage.setItem('rs_q',JSON.stringify(queue));
    updateBadge();
  }
}

async function flush(){
  if(DEMO||!queue.length) return;
  toast(`Syncing ${queue.length} update${queue.length>1?'s':''}…`,'info');
  const q=[...queue]; queue=[]; localStorage.setItem('rs_q','[]'); updateBadge();
  for(const c of q) await push(c);
  toast('All synced ✓','success');
}

async function doSync(){
  await flush();
  if(DEMO){ toast('Demo mode','info'); return; }
  await fetchJobs();
}

function updateBadge(){
  const b=document.getElementById('syncCnt');
  b.style.display=queue.length?'inline':'none';
  b.textContent=queue.length;
}

// ═══════════════════════════════════════
// PAYMENT
// ═══════════════════════════════════════
function openPay(job){
  const c=job.customer||{};
  document.getElementById('payName').textContent = (c.address||'').split(',')[0];
  document.getElementById('payAmt').textContent=`£${parseFloat(c.price||0).toFixed(2)}`;
  payMethod='cash';
  document.getElementById('mCash').classList.add('sel');
  document.getElementById('mCard').classList.remove('sel');
  document.getElementById('payModal').classList.add('open');
}
function pickMethod(m){
  payMethod=m;
  document.getElementById('mCash').classList.toggle('sel',m==='cash');
  document.getElementById('mCard').classList.toggle('sel',m==='card');
}
async function confirmPay(){
  if(!payJob) return;
  const c=payJob.customer||{};
  document.getElementById('payModal').classList.remove('open');
  await apply(payJob,'done',parseFloat(c.price||0),payMethod);
  payJob=null;
}
async function skipPay(){
  document.getElementById('payModal').classList.remove('open');
  if(payJob){ await apply(payJob,'done',null,null); payJob=null; }
}

// ═══════════════════════════════════════
// STATS
// ═══════════════════════════════════════
function stats(){
  const done  =jobs.filter(j=>j.status==='done').length;
  const miss  =jobs.filter(j=>j.status==='missed').length;
  const left  =jobs.filter(j=>j.status==='pending'||j.status==='return').length;
  const cash  =jobs.reduce((s,j)=>s+parseFloat(j.payment_amount||0),0);
  const total =jobs.length;
  document.getElementById('sDone').textContent=done;
  document.getElementById('sMiss').textContent=miss;
  document.getElementById('sLeft').textContent=left;
  document.getElementById('sCash').textContent=`£${cash.toFixed(0)}`;
  document.getElementById('progFill').style.width=total?Math.round(((done+miss)/total)*100)+'%':'0%';
}

// ═══════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════
function doLogout(){
  if(queue.length&&!DEMO&&!confirm(`${queue.length} unsynced — logout anyway?`)) return;
  localStorage.removeItem('rs_op');
  op=null;jobs=[];pin='';dots();
  document.getElementById('jobScreen').classList.remove('active');
  document.getElementById('loginScreen').classList.add('active');
  document.getElementById('pinErr').textContent='';
}
function load(t='Loading…'){ document.getElementById('loaderTxt').textContent=t; document.getElementById('loader').classList.add('show'); }
function hide(){ document.getElementById('loader').classList.remove('show'); }
let _t;
function toast(msg,type=''){
  const el=document.getElementById('toast');
  el.textContent=msg; el.className=`toast show ${type}`;
  clearTimeout(_t); _t=setTimeout(()=>el.classList.remove('show'),2800);
}
const wait=ms=>new Promise(r=>setTimeout(r,ms));
</script>
